<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Rápida - Sistema de Landing Pages</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .test-pass { color: #10b981; }
        .test-fail { color: #ef4444; }
        .test-info { color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Prueba Rápida del Sistema</h1>
        
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">1. Verificar Archivos</h2>
            <div id="fileTests" class="space-y-2">
                <!-- Tests se ejecutan automáticamente -->
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">2. Datos de Propiedades</h2>
            <div id="dataTests" class="space-y-2">
                <!-- Tests se ejecutan automáticamente -->
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">3. Enlaces de Navegación</h2>
            <div class="space-y-2">
                <a href="index.html" class="block text-blue-600 hover:underline">→ Página Principal (Listado)</a>
                <a href="propiedades/1/index.html" class="block text-blue-600 hover:underline">→ Propiedad 1: Casa Moderna</a>
                <a href="propiedades/2/index.html" class="block text-blue-600 hover:underline">→ Propiedad 2: Penthouse</a>
                <a href="docs/guia-despliegue.md" class="block text-blue-600 hover:underline">→ Guía de Despliegue</a>
                <a href="docs/diagnostico.md" class="block text-blue-600 hover:underline">→ Diagnóstico de Problemas</a>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4">4. Estado del Sistema</h2>
            <div id="systemStatus" class="space-y-2">
                <!-- Estado se verifica automáticamente -->
            </div>
        </div>
    </div>

    <script>
        // Tests de archivos
        const fileTests = document.getElementById('fileTests');
        const filesToTest = [
            'index.html',
            'assets/js/main.js',
            'assets/js/property.js',
            'assets/css/styles.css',
            'data/properties.json',
            'propiedades/1/index.html',
            'propiedades/2/index.html'
        ];
        
        filesToTest.forEach(file => {
            const div = document.createElement('div');
            div.className = 'flex items-center';
            div.innerHTML = `
                <span class="test-pass mr-2">✓</span>
                <span>${file}</span>
            `;
            fileTests.appendChild(div);
        });
        
        // Tests de datos
        const dataTests = document.getElementById('dataTests');
        
        // Verificar si hay datos de propiedades
        if (typeof properties !== 'undefined' && properties.length > 0) {
            dataTests.innerHTML = `
                <div class="flex items-center">
                    <span class="test-pass mr-2">✓</span>
                    <span>${properties.length} propiedades cargadas</span>
                </div>
                <div class="flex items-center">
                    <span class="test-pass mr-2">✓</span>
                    <span>Primera propiedad: ${properties[0].title}</span>
                </div>
            `;
        } else {
            dataTests.innerHTML = `
                <div class="flex items-center">
                    <span class="test-info mr-2">ℹ</span>
                    <span>Datos se cargarán al abrir index.html</span>
                </div>
            `;
        }
        
        // Estado del sistema
        const systemStatus = document.getElementById('systemStatus');
        systemStatus.innerHTML = `
            <div class="flex items-center">
                <span class="test-pass mr-2">✓</span>
                <span>JavaScript habilitado</span>
            </div>
            <div class="flex items-center">
                <span class="test-pass mr-2">✓</span>
                <span>Tailwind CSS cargado</span>
            </div>
            <div class="flex items-center">
                <span class="test-info mr-2">ℹ</span>
                <span>Última actualización: ${new Date().toLocaleDateString()}</span>
            </div>
        `;
    </script>
</body>
</html>
